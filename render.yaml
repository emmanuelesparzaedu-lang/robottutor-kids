# Despliegue en Render.com — https://render.com
# 1. Conecta este repositorio (o sube el proyecto)
# 2. Render detecta render.yaml y crea el servicio
# 3. En el panel, agrega la variable GEMINI_API_KEY (Secret)

services:
  - type: web
    name: robottutor-kids-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: NODE_ENV
        value: production
      - key: MAX_CONCURRENT_GEMINI
        value: "12"
      - key: MAX_QUEUE_WAIT_MS
        value: "35000"
      - key: GEMINI_MAX_RETRIES
        value: "3"
      - key: GEMINI_RETRY_BASE_MS
        value: "900"
      - key: GEMINI_TIMEOUT_MS
        value: "22000"
      - key: RATE_LIMIT_PER_MIN
        value: "30"
